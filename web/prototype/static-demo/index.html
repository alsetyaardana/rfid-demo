<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hotel RFID Operations Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <div class="brand-mark">RF</div>
          <div>
            <strong>Hotel RFID</strong>
            <span>Operations Platform</span>
          </div>
        </div>
        <nav class="nav-list" id="navList"></nav>
        <div class="sidebar-status">
          <span class="status-dot"></span>
          <div>
            <strong>Demo environment</strong>
            <span>Website-only MVP</span>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="pageEyebrow">Live linen demo</p>
            <h1 id="pageTitle">Dashboard</h1>
          </div>
          <div class="topbar-actions">
            <label class="search-box">
              <span aria-hidden="true">&#8981;</span>
              <input id="globalSearch" type="search" placeholder="Search EPC, batch, reader">
            </label>
            <div class="operator-chip">
              <span class="avatar">CP</span>
              <span>Crowne Plaza Demo</span>
            </div>
          </div>
        </header>

        <section class="content" id="screenRoot" aria-live="polite"></section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
